
<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Charles Chan · Digital Director / 港式叉燒.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+HK:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#EAF2FF;
  --dim:#8A9BB8;
  --bg0:#070A14;
  --bg1:#0C1122;
  --line:rgba(120,150,220,.16);
  --card:rgba(20,28,52,.55);
  --a1:#3DE0C8;
  --a2:#7B6CFF;
  --a3:#FF7A59;
  --glow:rgba(123,108,255,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Noto Sans HK','Space Grotesk',system-ui,sans-serif;
  background:var(--bg0);
  color:var(--ink);
  min-height:100dvh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
.field{position:fixed;inset:0;z-index:0;overflow:hidden;background:
  radial-gradient(120% 80% at 20% -10%, rgba(61,224,200,.10), transparent 55%),
  radial-gradient(120% 90% at 90% 0%, rgba(123,108,255,.16), transparent 55%),
  linear-gradient(180deg,var(--bg0),var(--bg1));}
.orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.55;
  animation:drift 18s ease-in-out infinite alternate;}
.orb.a{width:340px;height:340px;background:var(--a2);top:-80px;left:-60px;}
.orb.b{width:300px;height:300px;background:var(--a1);bottom:-90px;right:-70px;animation-delay:-6s;}
.orb.c{width:220px;height:220px;background:var(--a3);top:40%;right:-40px;opacity:.3;animation-delay:-11s;}
@keyframes drift{to{transform:translate3d(40px,30px,0) scale(1.15)}}
.grid{position:absolute;inset:0;opacity:.25;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:44px 44px;mask-image:radial-gradient(80% 60% at 50% 20%,#000,transparent);}

.wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:38px 22px 60px;}

.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--a1);opacity:0;animation:rise .7s .1s forwards;}
.name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(38px,11vw,54px);
  line-height:1.02;letter-spacing:-.02em;margin:10px 0 4px;
  background:linear-gradient(100deg,var(--ink),var(--a1),var(--a2));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  opacity:0;animation:rise .7s .2s forwards;}
.name .cn{display:block;font-family:'Noto Sans HK';font-weight:700;font-size:.5em;
  color:var(--ink);-webkit-text-fill-color:var(--ink);margin-top:6px;letter-spacing:.04em;}

.duo{display:flex;gap:8px;margin:22px 0 18px;opacity:0;animation:rise .7s .3s forwards;}
.tab{flex:1;border:1px solid var(--line);background:var(--card);border-radius:14px;
  padding:12px 14px;cursor:pointer;transition:.25s;backdrop-filter:blur(8px);text-align:left;}
.tab.on{border-color:transparent;box-shadow:0 0 0 1.5px var(--a2),0 8px 30px -12px var(--glow);
  background:linear-gradient(180deg,rgba(123,108,255,.14),rgba(20,28,52,.55));}
.tab{display:flex;align-items:center;gap:10px}
.tab .av{width:38px;height:38px;flex:none;border-radius:10px;object-fit:cover;
  border:1px solid var(--line);background:rgba(255,255,255,.04)}
.tab.two .av{border-radius:50%}
.tab .tt{min-width:0}
.tab h3{font-size:13.5px;font-weight:600;letter-spacing:.01em;color:var(--ink);line-height:1.2}
.tab.two h3{color:var(--a3)}
.tab p{font-size:10.5px;color:var(--dim);margin-top:2px;font-family:'JetBrains Mono',monospace;}

.bio{background:var(--card);border:1px solid var(--line);border-radius:18px;
  padding:16px 18px;font-size:14.5px;line-height:1.72;color:#C9D6EE;margin-top:0;
  backdrop-filter:blur(10px);opacity:0;animation:rise .7s .4s forwards;min-height:112px;}
.bio .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.bio .tags span{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--a1);
  border:1px solid var(--line);border-radius:20px;padding:3px 9px;}

.links{margin-top:22px;display:grid;gap:11px;opacity:0;animation:rise .7s .5s forwards;}
.lnk{display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--ink);
  background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px 16px;
  backdrop-filter:blur(8px);transition:.2s;position:relative;overflow:hidden;}
.lnk:active{transform:scale(.98)}
.lnk:hover{border-color:rgba(123,108,255,.5);transform:translateY(-1px)}
.lnk .ic{width:38px;height:38px;flex:none;border-radius:11px;display:grid;place-items:center;
  background:rgba(255,255,255,.04);border:1px solid var(--line);}
.lnk .ic svg{width:20px;height:20px}
.lnk .tx{min-width:0}
.lnk .tx b{display:block;font-size:14.5px;font-weight:600}
.lnk .tx small{display:block;color:var(--dim);font-size:11.5px;line-height:1.45;font-family:'JetBrains Mono',monospace;word-break:break-word}
.lnk .go{margin-left:auto;color:var(--dim);font-size:18px;transition:.2s}
.lnk:hover .go{color:var(--a1);transform:translateX(3px)}
.lnk.wa .ic{background:rgba(37,211,102,.12);border-color:rgba(37,211,102,.3)}
.lnk.wa .ic svg{fill:#25D366}

.qr{margin-top:26px;text-align:center;opacity:0;animation:rise .7s .6s forwards;}
.qr .frame{display:inline-block;padding:14px;background:#fff;border-radius:18px;
  box-shadow:0 20px 50px -20px var(--glow)}
.qr img{display:block;width:150px;height:150px;border-radius:6px}

.branches{margin-top:20px;display:none;opacity:0;animation:rise .7s .55s forwards;}
.branches.show{display:block}
.branches .bh{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.24em;
  text-transform:uppercase;color:var(--dim);text-align:center;margin-bottom:12px;position:relative;}
.branches .bh::before,.branches .bh::after{content:"";position:absolute;top:50%;width:22%;height:1px;
  background:var(--line);}
.branches .bh::before{left:6%}.branches .bh::after{right:6%}
.branches .bc{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:13px 15px;margin-bottom:9px;backdrop-filter:blur(8px);}
.branches .bc b{display:block;font-size:13px;font-weight:600;color:var(--ink);line-height:1.4}
.branches .bc small{display:block;margin-top:3px;font-size:11.5px;color:var(--dim);line-height:1.5}
.branches .bc .city{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.14em;
  color:var(--a1);text-transform:uppercase}
.qr p{margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:11px;
  letter-spacing:.14em;color:var(--dim);text-transform:uppercase}

.foot{margin-top:30px;text-align:center;font-family:'JetBrains Mono',monospace;
  font-size:10.5px;letter-spacing:.2em;color:var(--dim);opacity:.6}

@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){*{animation:none!important}.eyebrow,.name,.duo,.bio,.links,.qr{opacity:1!important}}

/* ── C: 頂部大切換掣 ── */
/* ── C: 檔案夾標籤風 ── */
.switch{margin:22px 0 0;display:flex;gap:6px;position:relative;z-index:2;
  opacity:0;animation:rise .7s .3s forwards;}
.switch button{flex:1;background:var(--card);border:1px solid var(--line);border-bottom:0;
  border-radius:16px 16px 0 0;cursor:pointer;padding:16px 10px 20px;
  display:flex;align-items:center;justify-content:center;gap:10px;color:var(--dim);
  transition:background .3s,color .3s,transform .3s;min-width:0;position:relative;
  transform:translateY(6px) scale(.97);opacity:.62;backdrop-filter:blur(8px);}
.switch button.act{color:#fff;opacity:1;transform:translateY(0) scale(1);
  border-color:var(--a2);border-bottom:0;z-index:2;
  background:linear-gradient(180deg,rgba(123,108,255,.22),rgba(20,28,52,.6));}
.switch button.two.act{border-color:var(--a3);
  background:linear-gradient(180deg,rgba(255,122,89,.2),rgba(20,28,52,.6));}
.switch button.act::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:6px;
  background:linear-gradient(180deg,rgba(20,28,52,.6),transparent);}
.switch .av{width:46px;height:46px;flex:none;border-radius:12px;object-fit:cover;
  border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06)}
.switch button.two .av{border-radius:50%}
.switch .sl{min-width:0}
.switch .sl b{display:block;font-size:14.5px;font-weight:600;line-height:1.2;text-align:left}
.switch .sl small{display:block;font-size:10px;font-family:'JetBrains Mono',monospace;
  opacity:.85;text-align:left;white-space:nowrap}
/* bio 卡同選中 tab 無縫黏合成檔案夾 */
.bio{border-radius:0 16px 16px 16px !important;margin-top:-1px;position:relative;z-index:1;
  border-color:var(--a2) !important;border-top-color:var(--line) !important;}
.switch.p1 ~ .bio{border-radius:16px 0 16px 16px !important;border-color:var(--a3) !important;
  border-top-color:var(--line) !important;}
</style>
</head>

function pick(i){
  var sw=document.getElementById('switch');
  if(sw){sw.className='switch p'+i;sw.querySelectorAll('button').forEach((b,n)=>b.classList.toggle('act',n===i));}
  const b=DATA.bios[i];
  document.getElementById('bio').innerHTML =
    b.text + '<div class="tags">'+b.tags.map(t=>`<span>${t}</span>`).join('')+'</div>';
  // 連結跟身份切換
  document.getElementById('links').innerHTML = DATA.links[i].map(l=>{
    const newTab = /^https?:/.test(l.url) ? ' target="_blank" rel="noopener"' : '';
    return `<a class="lnk ${l.icon}" href="${l.url}"${newTab}>
      <span class="ic">${IC[l.icon]||IC.web}</span>
      <span class="tx"><b>${l.label}</b><small>${l.sub}</small></span>
      <span class="go">→</span>
    </a>`;
  }).join('');
  // 分公司:只 PPI 頁 (i===0) 顯示
  const br=document.getElementById('branches');
  if(i===0){
    br.classList.add('show');
    br.innerHTML='<div class="bh">兩地分公司 · Mainland Offices</div>'+
      DATA.branches.map(x=>`<div class="bc"><b>${x.name}</b>`+
        `<small><span class="city">${x.city}</span> · ${x.desc}</small></div>`).join('');
  }else{
    br.classList.remove('show');
    br.innerHTML='';
  }
}
pick(0);
</script>
